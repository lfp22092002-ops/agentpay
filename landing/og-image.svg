<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Card icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="100" height="70" rx="10" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <rect x="0" y="18" width="100" height="14" fill="#3b82f6" opacity="0.3"/>
    <circle cx="75" cy="50" r="8" fill="#3b82f6" opacity="0.5"/>
    <circle cx="90" cy="50" r="8" fill="#8b5cf6" opacity="0.5"/>
  </g>
  <!-- Robot icon -->
  <g transform="translate(80, 310)">
    <rect x="20" y="0" width="60" height="50" rx="8" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="40" cy="20" r="5" fill="#8b5cf6"/>
    <circle cx="60" cy="20" r="5" fill="#8b5cf6"/>
    <rect x="35" y="32" width="30" height="4" rx="2" fill="#8b5cf6" opacity="0.6"/>
    <rect x="10" y="15" width="8" height="20" rx="4" fill="#8b5cf6" opacity="0.4"/>
    <rect x="82" y="15" width="8" height="20" rx="4" fill="#8b5cf6" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="220" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">AgentPay</text>
  <!-- Subtitle -->
  <text x="220" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">Give Your AI Agent a Wallet</text>
  <!-- Features -->
  <text x="220" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b">Telegram Stars · USDC Wallets · Virtual Cards · Approval Flows</text>
  <!-- URL -->
  <text x="220" y="420" font-family="system-ui, monospace" font-size="20" fill="#3b82f6">leofundmybot.dev</text>
  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
  <!-- Open Source badge -->
  <g transform="translate(900, 500)">
    <rect x="0" y="0" width="220" height="40" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="110" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">⚡ Open Source · MIT</text>
  </g>
</svg>
