version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentpay
      POSTGRES_PASSWORD: agentpay2026
      POSTGRES_DB: agentpay
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentpay:agentpay2026@db:5432/agentpay
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      API_SECRET: ${API_SECRET:-change-me-in-production}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - walletdata:/app/data

  bot:
    build: .
    restart: unless-stopped
    command: python -m bot.main
    environment:
      DATABASE_URL: postgresql+asyncpg://agentpay:agentpay2026@db:5432/agentpay
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      API_SECRET: ${API_SECRET:-change-me-in-production}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - walletdata:/app/data

volumes:
  pgdata:
  walletdata:
